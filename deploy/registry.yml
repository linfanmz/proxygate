# 自建 Docker Registry
#
# 前置: 域名 DNS 添加 A 记录 registry.你的域名.com → 服务器IP
#
# 启动: docker compose -f deploy/registry.yml up -d
# 推送: ./deploy/push.sh registry.你的域名.com
# 拉取: docker pull registry.你的域名.com/proxygate:latest

services:
  registry:
    image: registry:2
    container_name: registry
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry

volumes:
  registry-data:
